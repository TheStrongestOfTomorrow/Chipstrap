name: Release

# Auto-build and publish a Chipstrap APK release on every push to main.
# A new GitHub release is created with the debug + release APKs attached.
# Tag format: v<YYYYMMDD-HHMMSS>-<short-sha>

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # required to create releases / push tags

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;34.0.0'

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      # ───────────────────────────────────────────────────────────────────────
      # Release keystore setup.
      #
      # Two modes:
      #   (A) User provided CHIPSTRAP_KS_BASE64 (+ CHIPSTRAP_KS_PASS +
      #       CHIPSTRAP_KS_KEY_PASS + CHIPSTRAP_KS_ALIAS) secrets → decode &
      #       use that keystore.
      #   (B) No keystore secret → generate an ephemeral self-signed keystore
      #       with default passwords and a fixed alias "chipstrap".
      #
      # Both paths produce app/release.keystore and set KS_PASS, KS_KEY_PASS,
      # KS_ALIAS as env vars for the gradle build step.
      # ───────────────────────────────────────────────────────────────────────
      - name: Set up release keystore
        id: ks
        env:
          KS_B64: ${{ secrets.CHIPSTRAP_KS_BASE64 }}
          KS_PASS: ${{ secrets.CHIPSTRAP_KS_PASS }}
          KS_KEY_PASS: ${{ secrets.CHIPSTRAP_KS_KEY_PASS }}
          KS_ALIAS: ${{ secrets.CHIPSTRAP_KS_ALIAS }}
        run: |
          set -e
          KS_FILE="app/release.keystore"
          mkdir -p app

          # Mode A: user-provided keystore.
          if [ -n "$KS_B64" ]; then
            echo "Mode A: decoding user-provided keystore from CHIPSTRAP_KS_BASE64 secret"
            # Strip ALL whitespace/newlines before base64-decoding (base64 from
            # GitHub secrets UI sometimes has trailing newlines that break -d).
            echo "$KS_B64" | tr -d ' \n\r\t' | base64 -d > "$KS_FILE"
            echo "  Decoded keystore size: $(stat -c%s "$KS_FILE") bytes"

            # Validate it's actually a keystore before continuing. If the user
            # gave us a bad base64 or a non-keystore blob, fail loudly here
            # instead of letting gradle throw a cryptic padding error later.
            KS_PASS_VAL="${KS_PASS:-chipstrap-default-keystore-password}"
            KS_KEY_PASS_VAL="${KS_KEY_PASS:-$KS_PASS_VAL}"
            KS_ALIAS_VAL="${KS_ALIAS:-chipstrap}"

            echo "  Verifying keystore with keytool -list (alias=$KS_ALIAS_VAL)…"
            if ! keytool -list \
                -keystore "$KS_FILE" \
                -storepass "$KS_PASS_VAL" \
                -alias "$KS_ALIAS_VAL" > /dev/null 2> ks_verify.err; then
              echo "❌ Keystore verification failed. Underlying error:"
              cat ks_verify.err
              echo ""
              echo "This usually means one of:"
              echo "  - CHIPSTRAP_KS_BASE64 doesn't actually contain a PKCS12/JKS keystore"
              echo "  - CHIPSTRAP_KS_PASS doesn't match the keystore's store password"
              echo "  - CHIPSTRAP_KS_KEY_PASS doesn't match the key's password"
              echo "  - CHIPSTRAP_KS_ALIAS doesn't match the alias in the keystore"
              echo ""
              echo "Falling back to ephemeral keystore (Mode B) so the build still ships."
              rm -f "$KS_FILE" ks_verify.err
            else
              echo "  ✓ Keystore verified OK"
              # Export final values to GITHUB_ENV for subsequent steps.
              echo "KS_PASS=$KS_PASS_VAL" >> $GITHUB_ENV
              echo "KS_KEY_PASS=$KS_KEY_PASS_VAL" >> $GITHUB_ENV
              echo "KS_ALIAS=$KS_ALIAS_VAL" >> $GITHUB_ENV
              echo "using_user_keystore=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # Mode B: ephemeral self-signed keystore.
          # IMPORTANT: PKCS12 keystores do NOT support different store and key
          # passwords (keytool will silently ignore -keypass and use the store
          # password). We must use the SAME password for both — otherwise the
          # gradle build later will throw
          # "Failed to read key chipstrap: Given final block not properly padded".
          echo "Mode B: generating ephemeral self-signed keystore"
          KS_PASS_VAL="chipstrap-default-keystore-password"
          KS_KEY_PASS_VAL="$KS_PASS_VAL"   # MUST be identical for PKCS12
          KS_ALIAS_VAL="chipstrap"
          keytool -genkeypair -v \
            -keystore "$KS_FILE" \
            -storetype PKCS12 \
            -storepass "$KS_PASS_VAL" \
            -keypass "$KS_KEY_PASS_VAL" \
            -alias "$KS_ALIAS_VAL" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Chipstrap, OU=Build, O=Chipstrap, L=NA, ST=NA, C=NA"
          echo "  ✓ Ephemeral keystore created at $KS_FILE ($(stat -c%s "$KS_FILE") bytes)"
          echo "KS_PASS=$KS_PASS_VAL" >> $GITHUB_ENV
          echo "KS_KEY_PASS=$KS_KEY_PASS_VAL" >> $GITHUB_ENV
          echo "KS_ALIAS=$KS_ALIAS_VAL" >> $GITHUB_ENV
          echo "using_user_keystore=false" >> $GITHUB_OUTPUT

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Rename APKs
        run: |
          mkdir -p artifacts
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cp app/build/outputs/apk/debug/app-debug.apk artifacts/Chipstrap-debug-${SHORT_SHA}.apk
          cp app/build/outputs/apk/release/app-release.apk artifacts/Chipstrap-release-${SHORT_SHA}.apk
          ls -la artifacts/

      - name: Generate release tag
        id: tag
        run: |
          TS=$(date -u +"%Y%m%d-%H%M%S")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=v${TS}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=Chipstrap build ${TS} (${SHORT_SHA})" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            # Chipstrap build

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            **Built at:** ${{ steps.tag.outputs.tag }}

            ## Signing

            ${{ steps.ks.outputs.using_user_keystore == 'true' && 'Signed with the user-provided release keystore (CHIPSTRAP_KS_BASE64).' || 'Self-signed with an ephemeral keystore generated by CI. For production distribution, add your own CHIPSTRAP_KS_BASE64 / CHIPSTRAP_KS_PASS / CHIPSTRAP_KS_KEY_PASS / CHIPSTRAP_KS_ALIAS secrets.' }}

            ## Downloads

            - `Chipstrap-release-*.apk` — release build
            - `Chipstrap-debug-*.apk` — debug build (with `.debug` applicationId suffix)

            ## Install

            ```bash
            adb install -r Chipstrap-release-*.apk
            ```

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for usage instructions.
          files: |
            artifacts/Chipstrap-debug-*.apk
            artifacts/Chipstrap-release-*.apk
          generate_release_notes: true
          prerelease: false
